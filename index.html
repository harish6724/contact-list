<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="app-header__brand">
        <div class="brand-mark"></div>
        <h1>Contacts</h1>
      </div>
      <nav class="app-header__actions">
        <label class="btn btn-ghost" title="Import contacts from CSV">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import
          <input type="file" id="csv-import" accept=".csv" hidden>
        </label>
        <button id="btn-export" class="btn btn-ghost" title="Export contacts to CSV">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <button id="btn-theme" class="btn btn-icon" aria-label="Toggle theme">
          <span id="theme-icon"></span>
        </button>
        <button id="btn-add" class="btn btn-primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Contact
        </button>
      </nav>
    </header>

    <div class="app-body">

      <aside class="sidebar">
        <div class="sidebar-search">
          <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="search" placeholder="Search contacts…" autocomplete="off" spellcheck="false">
        </div>
        <div class="sidebar-toolbar">
          <div class="sidebar-control">
            <label for="sort">Sort</label>
            <select id="sort">
              <option value="name">Name</option>
              <option value="email">Email</option>
              <option value="createdAt">Date added</option>
            </select>
          </div>
          <div class="sidebar-control">
            <label for="group">Group</label>
            <select id="group">
              <option value="none">None</option>
              <option value="letter">Letter</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>
        <div class="sidebar-count" id="sidebar-count"></div>
        <div id="contact-list" class="contact-list" role="listbox" aria-label="Contacts"></div>
        <div id="list-empty" class="list-empty hidden">
          <p>No contacts found</p>
        </div>
      </aside>

      <main class="detail-pane">
        <div id="detail-empty" class="detail-empty">
          <div class="detail-empty__graphic">
            <div class="detail-empty__ring r1"></div>
            <div class="detail-empty__ring r2"></div>
            <div class="detail-empty__ring r3"></div>
            <svg class="detail-empty__icon" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <h2>Select a contact</h2>
          <p>Choose someone from the list to view their details</p>
        </div>
        <div id="detail-view" class="detail-view hidden"></div>
      </main>

    </div>
  </div>

  <!-- Flyout pane -->
  <div id="flyout-overlay" class="flyout-overlay hidden" aria-hidden="true">
    <div id="flyout-panel" class="flyout-panel" role="dialog" aria-modal="true" aria-labelledby="flyout-title">
      <div class="flyout-header">
        <h2 id="flyout-title">Add Contact</h2>
        <button id="flyout-close" class="btn btn-icon" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="contact-form" class="flyout-body" novalidate>
        <input type="hidden" id="contact-id">
        <div class="field">
          <label for="field-name">Full name <span class="required">*</span></label>
          <input type="text" id="field-name" required autocomplete="off" placeholder="e.g. Jane Smith">
          <span class="field__error" id="error-name"></span>
        </div>
        <div class="field">
          <label for="field-email">Email address</label>
          <input type="email" id="field-email" autocomplete="off" placeholder="jane@example.com">
          <span class="field__error" id="error-email"></span>
        </div>
        <div class="field">
          <label for="field-phone">Phone number</label>
          <input type="tel" id="field-phone" autocomplete="off" placeholder="+1 555 000 0000">
        </div>
        <div class="field">
          <label for="field-category">Category</label>
          <input type="text" id="field-category" autocomplete="off" placeholder="Work, Friends, Family…">
        </div>
      </form>
      <div class="flyout-footer">
        <button type="button" id="flyout-cancel" class="btn btn-ghost">Cancel</button>
        <button type="submit" form="contact-form" class="btn btn-primary">Save contact</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm dialog -->
  <div id="confirm-overlay" class="confirm-overlay hidden" role="dialog" aria-modal="true">
    <div class="confirm-dialog">
      <div class="confirm-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h3>Delete contact?</h3>
      <p id="confirm-message">This cannot be undone.</p>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <script defer src="app.js"></script>
</body>
</html>
